name: Sync Feishu Calendar

on:
  schedule:
    # 每天凌晨2点（北京时间10点）自动执行
    - cron: '0 18 * * *'
  workflow_dispatch:  # 允许手动触发
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install requests python-ics
      
      - name: Get Feishu Events
        env:
          FEISHU_TOKEN: ${{ secrets.FEISHU_TOKEN }}
          CALENDAR_ID: ${{ secrets.CALENDAR_ID }}
        run: python sync_calendar.py
      
      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Sync calendar $(date +'%Y-%m-%d')"
          file_pattern: "calendar.ics"
      
      - name: Generate README with latest events
        run: |
          echo "# 飞书日程同步" > README.md
          echo "" >> README.md
          echo "## 订阅地址" >> README.md
          echo "" >> README.md
          echo '\`\`\`' >> README.md
          echo "https://${{ github.repository_owner }}.github.io/feishu-calendar/calendar.ics" >> README.md
          echo '\`\`\`' >> README.md
          echo "" >> README.md
          echo "最后更新: $(date +'%Y-%m-%d %H:%M:%S')" >> README.md
      
      - name: Commit README update
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update README"
          file_pattern: "README.md"
